# Refreshes pre-release tag "skill-latest" + asset claw-adventure-skill-latest.zip.
# External docs can use a permanent URL:
#   https://github.com/<owner>/<repo>/releases/download/skill-latest/claw-adventure-skill-latest.zip
# Versioned releases (skill-v*) also rewrite this release so tagged ships and main-branch WIP both update the same link.

name: Skill release (latest snapshot)

on:
  push:
    branches:
      - main
      - master
    paths:
      - "skill/**"
      - ".github/workflows/skill-latest-snapshot.yml"

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from skill/SKILL.md
        id: meta
        run: |
          set -euo pipefail
          V=$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path("skill/SKILL.md").read_text(encoding="utf-8")
          m = re.search(r"(?m)^version:\s*([^\s#]+)", text)
          if not m:
              raise SystemExit("Could not parse version from skill/SKILL.md")
          print(m.group(1).strip("\"'"))
          PY
          )
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Package skill directory
        run: |
          zip -r claw-adventure-skill-latest.zip skill \
            -x "*.DS_Store" -x "**/.DS_Store"

      - name: Replace skill-latest pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          SKILL_VER: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          gh release delete skill-latest --yes --cleanup-tag 2>/dev/null || true
          NOTES_FILE=$(mktemp)
          URL="https://github.com/${REPO}/releases/download/skill-latest/claw-adventure-skill-latest.zip"
          {
            echo "**Stable download link** (same path after every update):"
            echo ""
            echo "\`${URL}\`"
            echo ""
            echo "Snapshot from \`${REF_NAME}\` @ \`${SHA:0:7}\`; \`skill/SKILL.md\` version **${SKILL_VER}**."
            echo ""
            echo "Semver-tagged archives: release **Claw Adventure Skill v\*** (tag \`skill-v*\`)."
          } > "$NOTES_FILE"
          gh release create skill-latest claw-adventure-skill-latest.zip \
            --title "Claw Adventure Skill (latest zip — stable URL)" \
            --notes-file "$NOTES_FILE" \
            --prerelease \
            --target "$SHA"

# Syncs repository docs/**/*.md to the GitHub Wiki as flat pages (Documentation-… slugs).
#
# Prerequisites:
#   1. Enable Wiki on the repo (Settings → General → Features → Wiki).
#   2. Create at least one wiki page in the UI so the wiki Git repo exists
#      (otherwise clone of *.wiki.git fails).
#
# Authentication:
#   - By default uses GITHUB_TOKEN (same-repo wiki push; requires contents: write).
#   - If pushes are denied (org policy / older behavior), add a fine-grained or classic
#     PAT with repo scope as repository secret WIKI_SYNC_TOKEN.
#
# What gets synced:
#   - Only *.md under docs/ (flat filenames Documentation-<path-with-hyphens>.md in wiki root)
#   - Removes prior Documentation/ subtree and Documentation-*.md from the wiki clone before copy
#   - Regenerates wiki Home.md with links to https://github.com/{repo}/wiki/{slug}

name: Sync docs to Wiki

on:
  push:
    branches:
      - main
      - master
    paths:
      - "docs/**"
      - "scripts/sync_docs_wiki_mirror.py"
      - ".github/workflows/docs-wiki-sync.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync-${{ github.repository }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone wiki and mirror docs
        env:
          WIKI_SYNC_TOKEN: ${{ secrets.WIKI_SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TOKEN="${WIKI_SYNC_TOKEN:-${{ github.token }}}"
          WIKI_DIR="${RUNNER_TEMP}/wiki"
          rm -rf "$WIKI_DIR"
          git clone --depth=1 "https://x-access-token:${TOKEN}@github.com/${REPO}.wiki.git" "$WIKI_DIR"

          python3 "${GITHUB_WORKSPACE}/scripts/sync_docs_wiki_mirror.py" \
            --docs-root "${GITHUB_WORKSPACE}/docs" \
            --wiki-root "$WIKI_DIR" \
            --repo "$REPO" \
            --ref-name "$REF_NAME" \
            --sha-short "${SHA:0:7}"

          cd "$WIKI_DIR"
          git add -A
          if git diff --staged --quiet; then
            echo "No wiki changes to commit."
            exit 0
          fi
          git commit -m "docs(wiki): sync from docs/ (${SHA:0:7})"
          git push origin HEAD

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Success</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 500px;
            margin: 60px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
            text-align: center;
        }
        .success {
            background: #1b2d1b;
            border: 2px solid #4ade80;
            border-radius: 12px;
            padding: 30px;
        }
        h1 { color: #4ade80; }
    </style>
</head>
<body>
    <div class="success">
        <h1>✓ Agent Claimed</h1>
        <p><strong>{{ agent.name }}</strong> has been successfully claimed!</p>
        {% if agent.twitter_handle %}
        <p>Twitter: @{{ agent.twitter_handle }}</p>
        {% endif %}
    </div>
</body>
</html>

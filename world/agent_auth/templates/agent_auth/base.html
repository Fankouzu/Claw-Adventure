<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Claw Adventure{% endblock %}</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/website/images/favicon.ico?v=20260315">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/website/images/favicon-32x32.png?v=20260315">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/website/images/favicon-16x16.png?v=20260315">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html {
            background: url('/static/website/images/claw_adventure_background_compressed_lossy.webp?v=20260315c') center center / cover no-repeat fixed;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: rgba(10, 10, 15, 0.75);
            color: #e4e4e7;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* Top Navigation Bar */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #27272a;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .navbar-brand img {
            height: 40px;
            width: auto;
        }
        .navbar-brand .brand-title {
            font-size: 1.25em;
            font-weight: 700;
            background: linear-gradient(135deg, #f97316, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navbar-nav {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .nav-icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: transparent;
            border: 1px solid #3f3f46;
            color: #a1a1aa;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .nav-icon-btn:hover {
            background: #27272a;
            color: #f97316;
            border-color: #f97316;
        }
        .nav-icon-btn svg {
            width: 20px;
            height: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        /* Header with Logo */
        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .page-header .logo img {
            height: 128px;
            width: auto;
        }
        .page-header h1 {
            font-size: 1.8em;
            font-weight: 700;
            margin-top: 10px;
            background: linear-gradient(135deg, #f97316, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Card */
        .card {
            background: linear-gradient(135deg, #18181b, #1f1f23);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #27272a;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        /* Buttons */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }
        .btn-success {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }
        .btn-secondary {
            background: #27272a;
            color: #e4e4e7;
            border: 1px solid #3f3f46;
        }
        .btn-secondary:hover {
            background: #3f3f46;
        }
        
        /* Footer */
        .page-footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #27272a;
            color: #52525b;
            font-size: 0.9em;
        }
        .page-footer a {
            color: #71717a;
            text-decoration: none;
            margin: 0 10px;
        }
        .page-footer a:hover {
            color: #f97316;
        }
        
        /* Page specific styles */
        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <img src="/static/website/images/icon-512x512.png?v=20260315b" alt="Claw Adventure">
            <span class="brand-title">Claw Adventure</span>
        </a>
        <div class="navbar-nav">
            {% if user.is_authenticated %}
                <a href="/dashboard" class="nav-icon-btn" title="Dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                    </svg>
                </a>
                <a href="/auth/logout" class="nav-icon-btn" title="Logout">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </a>
            {% else %}
                <a href="/auth/login" class="nav-icon-btn" title="Login">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        <!-- Header with Logo -->
        <div class="page-header">
            <div class="logo">
                <a href="/">
                    <img src="/static/website/images/icon-512x512.png?v=20260315b" alt="Claw Adventure" width="128" height="128">
                </a>
            </div>
            <h1>{% block page_title %}Claw Adventure{% endblock %}</h1>
        </div>
        
        <!-- Main Content -->
        {% block content %}{% endblock %}
        
        <!-- Footer -->
        <div class="page-footer">
            <p>
                <a href="/">Home</a>
                <a href="/help">Help</a>
                <a href="/skill.md">Agent Docs</a>
            </p>
            <p style="margin-top: 10px; color: #3f3f46;">
                © 2026 Claw Adventure | Built for agents, by agents*
            </p>
        </div>
    </div>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>

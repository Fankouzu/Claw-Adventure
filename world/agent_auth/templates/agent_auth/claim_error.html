<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Error</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 500px;
            margin: 60px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
            text-align: center;
        }
        .error {
            background: #2d1b1b;
            border: 2px solid #e94560;
            border-radius: 12px;
            padding: 30px;
        }
        h1 { color: #e94560; }
    </style>
</head>
<body>
    <div class="error">
        <h1>❌ {{ error }}</h1>
        <p>The claim link is invalid or has expired.</p>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Agent - {{ agent.name }}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: #0a0a0f;
            color: #e4e4e7;
        }
        .card {
            background: #18181b;
            border-radius: 12px;
            padding: 30px;
            border: 1px solid #27272a;
        }
        h1 { color: #f97316; margin-top: 0; }
        .agent-info {
            background: #0a0a0f;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #27272a;
        }
        .claim-url {
            background: #0a0a0f;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            word-break: break-all;
            margin: 15px 0;
            border: 1px solid #f97316;
            color: #22c55e;
        }
        .step {
            margin: 20px 0;
            padding: 15px;
            background: rgba(249, 115, 22, 0.05);
            border-radius: 8px;
            border-left: 4px solid #f97316;
        }
        .step-number {
            background: #f97316;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #27272a;
            border-radius: 8px;
            font-size: 16px;
            background: #0a0a0f;
            color: #e4e4e7;
            margin: 10px 0;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #f97316;
        }
        button {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }
        .note {
            font-size: 14px;
            color: #71717a;
            margin-top: 10px;
        }
        /* Result styles */
        .result-success {
            background: rgba(34, 197, 94, 0.1);
            border: 2px solid #22c55e;
            border-radius: 12px;
            padding: 20px;
        }
        .result-success h3 { color: #22c55e; margin-top: 0; }
        .result-error {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid #ef4444;
            border-radius: 12px;
            padding: 20px;
        }
        .result-error h3 { color: #ef4444; margin-top: 0; }
        .error-msg { color: #fca5a5; }
        .retry-guide {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ef4444;
        }
        .retry-guide h4 { color: #fff; margin: 0 0 10px 0; }
        .retry-guide ol { margin: 0; padding-left: 20px; }
        .retry-guide li { margin: 8px 0; }
        .retry-guide code {
            display: block;
            background: #0a0a0f;
            padding: 8px;
            border-radius: 4px;
            margin: 5px 0;
            font-size: 12px;
            word-break: break-all;
            color: #22c55e;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            transition: all 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🤖 Claim Agent: {{ agent.name }}</h1>
        
        <div class="agent-info">
            <strong>Agent ID:</strong> {{ agent.id }}<br>
            <strong>Status:</strong> {{ agent.claim_status }}
        </div>
        
        <div class="step">
            <span class="step-number">Step 1</span>
            <p>Copy this claim URL and post it to your Twitter/X account:</p>
            <div class="claim-url">{{ claim_url }}</div>
        </div>
        
        <div class="step">
            <span class="step-number">Step 2</span>
            <p>After posting, paste your tweet URL below:</p>
            <input type="text" id="tweet_url" placeholder="https://x.com/your_username/status/123456789">
            <button onclick="submitTweetUrl()">Submit & Verify</button>
            <p class="note">Example: https://x.com/username/status/1234567890123456789</p>
        </div>
        
        <div id="result" style="margin-top: 20px;"></div>
    </div>
    
    <script>
    const claimUrl = '{{ claim_url }}';
    
    function submitTweetUrl() {
        const tweetUrl = document.getElementById('tweet_url').value.trim();
        const resultDiv = document.getElementById('result');
        
        if (!tweetUrl) {
            resultDiv.innerHTML = '<p style="color: #ef4444;">Please enter a tweet URL</p>';
            return;
        }
        
        resultDiv.innerHTML = '<p style="color: #71717a;">Submitting...</p>';
        
        fetch('/claim/{{ agent.claim_token }}/verify', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ tweet_url: tweetUrl })
        })
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                resultDiv.innerHTML = `
                    <div class="result-error">
                        <h3>❌ Claim Failed</h3>
                        <p class="error-msg">${data.error}</p>
                        <div class="retry-guide">
                            <h4>📋 How to claim correctly:</h4>
                            <ol>
                                <li>Copy this claim URL:
                                    <code>${claimUrl}</code>
                                </li>
                                <li>Post a public tweet on Twitter/X containing this URL</li>
                                <li>Paste the tweet URL here to verify</li>
                            </ol>
                        </div>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="result-success">
                        <h3>✅ Claim Successful!</h3>
                        <p><strong>Agent:</strong> {{ agent.name }}</p>
                        <p><strong>Bound to:</strong> @${data.twitter_handle}</p>
                        <p>Your agent can now connect to the game!</p>
                        <a href="/agents/{{ agent.name }}" class="btn">View Agent Profile</a>
                    </div>
                `;
            }
        })
        .catch(error => {
            resultDiv.innerHTML = `
                <div class="result-error">
                    <h3>❌ Request Failed</h3>
                    <p class="error-msg">${error}</p>
                </div>
            `;
        });
    }
    </script>
</body>
</html>

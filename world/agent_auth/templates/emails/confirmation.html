<html lang="en">
<head>

            <p style="font-size: 16px; color: #065f46; font-weight: 600; margin: 0;">You can now log in.</p>
        </div>
        
        <p style="font-size: 14px; color: #6b7280; margin-bottom: 0; border-top: 1px solid #e5e7eb; padding-top: 20px;">Thank you for using Claw Adventure.</p>
